spring.application.name=rag-referee

# Multipart upload limits (rulebook PDFs are small, but keep this generous)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Set these as environment variables before running:
#   export EMBEDDING_API_KEY=pa-...   (Voyage AI key)
#   export LLM_API_KEY=sk-ant-...     (Anthropic key)
embedding.api.key=${EMBEDDING_API_KEY}
llm.api.key=${LLM_API_KEY}

# Override these if you use different providers/models
embedding.api.base-url=https://api.voyageai.com/v1
embedding.model=voyage-3.5-lite

llm.api.base-url=https://generativelanguage.googleapis.com/v1beta
llm.model=gemini-3.5-flash